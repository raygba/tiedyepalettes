<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tie-Dye Palette Builder</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

</head>

<body>
    <header>

        <h1>Tie-Dye Palette Builder</h1>

        <div>
            <button type="button" id="darkBtn" onclick="darkMode()" title="Toggle dark mode"
                aria-label="Toggle dark mode"><abbr>🌙</abbr></button>
            <button type="button" id="fontBtn" onclick="toggleFont()" title="Toggle font" aria-label="Toggle font">🔤
            </button>
        </div>

    </header>

    <main>
        <div>
            <div id="myPalettes">
                <section>
                    <h2>Current Palette</h2>
                    <ul id="currentPalette"></ul>
                    <button type="button" id="saveBtn">save</button>
                    <button type="button" id="randomBtn">random</button>
                    <button type="button" id="clearBtn">clear</button>
                </section>
            </div>

            <section>
                <ul id="colorList">
                </ul>
            </section>
        </div>

        <section id="savedPalettes">
            <div class="section-header">
                <h2>Saved Palettes</h2>
                <button type="button" id="delBtn">delete all</button>
            </div>
            <ul id="saveList">
            </ul>
        </section>

    </main>

    <footer>
        <p>made for my love 💚</p>
        <p>by <a href="https://github.com/raygba">ray</a> 2026</p>
    </footer>
</body>

</html>
